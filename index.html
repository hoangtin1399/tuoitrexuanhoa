<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đoàn TNCS Hồ Chí Minh - Phường Xuân Hòa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body {background: linear-gradient(to bottom, #b91c1c, #991b1b); color:white;}</style>
</head>
<body class="text-center">
<header class="bg-black/40 fixed w-full py-4 z-50">
  <div class="max-w-6xl mx-auto px-6 flex justify-between">
    <h1 class="text-2xl font-bold">Đoàn TNCS Hồ Chí Minh - Phường Xuân Hòa</h1>
    <nav class="flex gap-6">
      <a href="index.html">Trang chủ</a>
      <a href="ban-do-so.html">Bản đồ bầu cử</a>
      <a href="tao-hoat-dong.html">Tạo hoạt động</a>
      <a href="diem-danh.html">Điểm danh cơ sở</a>
    </nav>
  </div>
</header>

<main class="pt-32 pb-20 px-6 max-w-5xl mx-auto">
  <!-- Hero giống gốc -->
  <h2 class="text-6xl font-black">TUỔI TRẺ SỐ PHƯỜNG XUÂN HÒA</h2>
  <p class="text-3xl mt-6">Bản Lĩnh — Tiên Phong — Sáng Tạo</p>

  <!-- Countdown -->
  <div class="mt-12 bg-white/15 backdrop-blur p-8 rounded-3xl inline-block">
    <div id="countdown" class="grid grid-cols-4 gap-6 text-5xl font-mono"></div>
  </div>

  <a href="ban-do-so.html" class="block mt-10 bg-yellow-500 text-black text-3xl font-bold py-6 px-16 rounded-full">MỞ BẢN ĐỒ BẦU CỬ</a>

  <!-- Danh sách hoạt động mới -->
  <h3 class="text-4xl font-bold mt-20 mb-8">Hoạt động sắp tới</h3>
  <div id="activities" class="grid md:grid-cols-3 gap-6"></div>
</main>

<script>
// Countdown
const target = new Date('2026-03-15T07:00:00+07:00').getTime();
setInterval(()=>{/* code countdown giống trước */},1000);

// Hiển thị hoạt động từ localStorage
function loadActivities() {
  const acts = JSON.parse(localStorage.getItem('activities') || '[]');
  let html = '';
  acts.forEach(a => {
    html += `
      <div class="bg-white/10 p-6 rounded-3xl text-left">
        ${a.anh ? `<img src="${a.anh}" class="w-full h-48 object-cover rounded-2xl mb-4">` : ''}
        <h4 class="font-bold text-xl">${a.ten}</h4>
        <p class="text-yellow-300">${new Date(a.thoiGian).toLocaleString('vi-VN')}</p>
        <p class="mt-3 text-sm">${a.moTa}</p>
      </div>`;
  });
  document.getElementById('activities').innerHTML = html || '<p class="col-span-3">Chưa có hoạt động nào.</p>';
}
loadActivities();
</script>
</body>
</html>
