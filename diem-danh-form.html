<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Điểm danh sự kiện - Phường Xuân Hòa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(to bottom, #b91c1c, #7f1d1d); color: white; min-height: 100vh; }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(250,204,21,0.4); }
    .animate-fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-8 border border-white/20 animate-fade-in">
    <h1 class="text-3xl md:text-4xl font-bold text-center mb-8">Điểm Danh Sự Kiện</h1>
    
    <div class="space-y-6">
      <div>
        <label class="block text-lg font-medium mb-2">Họ và tên</label>
        <input id="ten" type="text" placeholder="Ví dụ: Nguyễn Văn A" 
               class="w-full px-5 py-4 bg-white/15 border border-white/30 rounded-full text-white placeholder-gray-300 focus:border-yellow-400 transition" required>
      </div>
      
      <div>
        <label class="block text-lg font-medium mb-2">Đơn vị / Chi đoàn</label>
        <input id="donvi" type="text" placeholder="Ví dụ: Chi đoàn 1" 
               class="w-full px-5 py-4 bg-white/15 border border-white/30 rounded-full text-white placeholder-gray-300 focus:border-yellow-400 transition" required>
      </div>
      
      <div>
        <label class="block text-lg font-medium mb-2">Chức vụ</label>
        <input id="chucvu" type="text" placeholder="Ví dụ: Bí thư chi đoàn" 
               class="w-full px-5 py-4 bg-white/15 border border-white/30 rounded-full text-white placeholder-gray-300 focus:border-yellow-400 transition">
      </div>
      
      <div>
        <label class="block text-lg font-medium mb-2">Số điện thoại</label>
        <input id="sdt" type="tel" placeholder="Ví dụ: 0909123456" 
               class="w-full px-5 py-4 bg-white/15 border border-white/30 rounded-full text-white placeholder-gray-300 focus:border-yellow-400 transition" required>
      </div>
      
      <button onclick="diemDanh()" 
              class="w-full bg-green-600 hover:bg-green-500 text-white font-bold text-xl py-5 rounded-full shadow-lg transition transform hover:scale-105 mt-4">
        ĐIỂM DANH NGAY
      </button>
    </div>
    
    <p class="text-center mt-8 text-sm opacity-80">Mỗi thiết bị chỉ điểm danh được 1 lần cho sự kiện này.</p>
  </div>

  <script>
  const urlParams = new URLSearchParams(window.location.search);
  const eventId = urlParams.get('id');

  function diemDanh() {
    if (!eventId) return alert('Link điểm danh không hợp lệ!');
    
    const ten = document.getElementById('ten').value.trim();
    const donvi = document.getElementById('donvi').value.trim();
    const chucvu = document.getElementById('chucvu').value.trim();
    const sdt = document.getElementById('sdt').value.trim();
    
    if (!ten || !donvi || !sdt) return alert('Vui lòng điền đầy đủ thông tin bắt buộc!');
    
    const daDiem = localStorage.getItem('daDiemDanh_' + eventId);
    if (daDiem) {
      alert('❌ Bạn đã điểm danh cho sự kiện này rồi! Không thể điểm danh lại.');
      return;
    }
    
    const data = { ten, donvi, chucvu, sdt, thoiGian: new Date().toLocaleString('vi-VN') };
    localStorage.setItem('daDiemDanh_' + eventId, JSON.stringify(data));
    
    alert('✅ Điểm danh thành công! Cảm ơn bạn đã tham gia.\nThông tin đã được ghi nhận.');
    window.location.href = 'index.html'; // Quay về trang chủ
  }
  </script>
</body>
</html>
