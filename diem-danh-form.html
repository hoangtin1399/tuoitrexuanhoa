<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Điểm danh sự kiện - Phường Xuân Hòa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root { --primary-blue: #0D47A1; --light-blue: #2196F3; }
    body { background: linear-gradient(to bottom, #e3f2fd, #bbdefb); color: #0d47a1; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gradient-to-r from-[#0D47A1] to-[#1976D2] text-white py-4 shadow-lg fixed w-full z-50">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Emblem_of_the_Communist_Party_of_Vietnam.svg/1200px-Emblem_of_the_Communist_Party_of_Vietnam.svg.png" alt="Logo Đoàn" class="h-10 w-10 md:h-12 md:w-12">
        <div>
          <h1 class="text-lg md:text-2xl font-bold">Tuổi Trẻ Xuân Hòa</h1>
          <p class="text-xs md:text-base">Đoàn TNCS Hồ Chí Minh Phường Xuân Hòa</p>
        </div>
      </div>
      <a href="index.html" class="text-white hover:text-yellow-300 font-medium">← Trang chủ</a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 pt-28 pb-20 px-6 max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-center mb-10 text-[#0D47A1]">Điểm Danh Sự Kiện</h1>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form id="form" class="space-y-6">
        <div>
          <label class="block text-lg font-medium mb-2 text-gray-700">Họ và tên</label>
          <input id="ten" type="text" placeholder="Ví dụ: Nguyễn Văn A" class="w-full px-5 py-4 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-[#2196F3]" required>
        </div>
        <div>
          <label class="block text-lg font-medium mb-2 text-gray-700">Đơn vị / Chi đoàn</label>
          <input id="donvi" type="text" placeholder="Ví dụ: Chi đoàn 1" class="w-full px-5 py-4 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-[#2196F3]" required>
        </div>
        <div>
          <label class="block text-lg font-medium mb-2 text-gray-700">Chức vụ</label>
          <input id="chucvu" type="text" placeholder="Ví dụ: Bí thư chi đoàn" class="w-full px-5 py-4 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-[#2196F3]">
        </div>
        <div>
          <label class="block text-lg font-medium mb-2 text-gray-700">Số điện thoại</label>
          <input id="sdt" type="tel" placeholder="Ví dụ: 0909123456" class="w-full px-5 py-4 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-[#2196F3]" required>
        </div>

        <button type="button" onclick="diemDanh()" class="w-full bg-[#0D47A1] hover:bg-[#1976D2] text-white font-bold text-xl py-5 rounded-full shadow-lg transition">
          ĐIỂM DANH NGAY
        </button>
      </form>

      <div id="ketqua" class="hidden text-center mt-10">
        <h2 class="text-3xl font-bold text-[#0D47A1] mb-6">Điểm danh thành công!</h2>
        <p class="text-xl mb-4">Cảm ơn bạn đã tham gia.</p>
        <button onclick="window.location.href='index.html'" class="mt-6 bg-[#0D47A1] text-white py-4 px-10 rounded-full font-bold">
          Quay về trang chủ
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-[#0D47A1] text-white py-4 text-center overflow-hidden mt-auto">
    <div class="marquee inline-block whitespace-nowrap">
      <span class="text-lg font-medium">Được thực hiện bởi HMT - Đoàn phường Xuân Hòa</span>
    </div>
  </footer>

  <style>
    .marquee { animation: scroll 25s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  </style>

  <script>
    // THAY CONFIG THẬT CỦA BẠN VÀO ĐÂY
    const firebaseConfig = {
       apiKey: "AIzaSyAiAgc4XXNvZR-Dzm4Qwmicz-8WkS-xb_c",
  authDomain: "doanphuongxuanhoa-133a1.firebaseapp.com",
  projectId: "doanphuongxuanhoa-133a1",
  storageBucket: "doanphuongxuanhoa-133a1.firebasestorage.app",
  messagingSenderId: "427741291509",
  appId: "1:427741291509:web:3fc3fc7a3a8e6d6b11f6bc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('id');

    if (eventId) {
      db.ref('events/' + eventId).once('value').then(snap => {
        if (!snap.exists()) {
          alert('Sự kiện không tồn tại hoặc đã hết hạn!');
          window.location.href = 'index.html';
        }
      });
    } else {
      alert('Link điểm danh không hợp lệ!');
      window.location.href = 'index.html';
    }

    function diemDanh() {
      const ten = document.getElementById('ten').value.trim();
      const donvi = document.getElementById('donvi').value.trim();
      const chucvu = document.getElementById('chucvu').value.trim();
      const sdt = document.getElementById('sdt').value.trim();

      if (!ten || !donvi || !sdt) return alert('Vui lòng điền đầy đủ thông tin bắt buộc!');

      if (localStorage.getItem('daDiemDanh_' + eventId)) {
        alert('Bạn đã điểm danh cho sự kiện này rồi!');
        return;
      }

      const data = {
        ten,
        donvi,
        chucvu: chucvu || '-',
        sdt,
        thoiGian: new Date().toLocaleString('vi-VN')
      };

      db.ref('attendance/' + eventId).push(data)
        .then(() => {
          localStorage.setItem('daDiemDanh_' + eventId, 'true');
          document.getElementById('form').classList.add('hidden');
          document.getElementById('ketqua').classList.remove('hidden');
        })
        .catch(err => alert('Lỗi: ' + err.message));
    }
  </script>
</body>
</html>
