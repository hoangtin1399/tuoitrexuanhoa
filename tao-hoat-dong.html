<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tạo hoạt động</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-red-800 to-red-950 text-white min-h-screen">
<header class="bg-black/50 py-4 text-center"><a href="index.html" class="text-yellow-300">← Trang chủ</a></header>

<div class="max-w-2xl mx-auto p-8 mt-10 bg-white/10 rounded-3xl">
  <h1 class="text-4xl font-bold text-center mb-8">TẠO HOẠT ĐỘNG MỚI</h1>
  <form id="form">
    <input id="ten" type="text" placeholder="Tên hoạt động" class="w-full p-4 rounded-2xl mb-4 bg-white/20" required>
    <input id="thoiGian" type="datetime-local" class="w-full p-4 rounded-2xl mb-4 bg-white/20" required>
    <textarea id="moTa" placeholder="Mô tả hoạt động" class="w-full p-4 rounded-2xl h-32 bg-white/20"></textarea>
    
    <label class="block mt-6 mb-2 font-bold">Đính kèm hình ảnh</label>
    <input id="anh" type="file" accept="image/*" class="w-full">
    <img id="preview" class="mt-4 hidden w-full rounded-2xl">

    <button type="submit" class="w-full mt-8 bg-yellow-400 text-black py-6 text-2xl font-bold rounded-full">TẠO HOẠT ĐỘNG</button>
  </form>
</div>

<script>
document.getElementById('anh').onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => document.getElementById('preview').src = ev.target.result;
  reader.readAsDataURL(file);
  document.getElementById('preview').classList.remove('hidden');
};

document.getElementById('form').onsubmit = e => {
  e.preventDefault();
  const activities = JSON.parse(localStorage.getItem('activities') || '[]');
  activities.push({
    id: Date.now(),
    ten: document.getElementById('ten').value,
    thoiGian: document.getElementById('thoiGian').value,
    moTa: document.getElementById('moTa').value,
    anh: document.getElementById('preview').src || ''
  });
  localStorage.setItem('activities', JSON.stringify(activities));
  alert('✅ Hoạt động đã được tạo và hiển thị trên trang chủ!');
  window.location = 'index.html';
};
</script>
</body>
</html>
