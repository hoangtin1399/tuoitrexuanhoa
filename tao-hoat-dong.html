<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tạo hoạt động - Phường Xuân Hòa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --primary-blue: #0D47A1; --light-blue: #2196F3; }
    body { background: linear-gradient(to bottom, #e3f2fd, #bbdefb); color: #0d47a1; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gradient-to-r from-[#0D47A1] to-[#1976D2] text-white py-4 shadow-lg fixed w-full z-50">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Emblem_of_the_Communist_Party_of_Vietnam.svg/1200px-Emblem_of_the_Communist_Party_of_Vietnam.svg.png" alt="Logo Đoàn" class="h-10 w-10 md:h-12 md:w-12">
        <div>
          <h1 class="text-lg md:text-2xl font-bold">Tuổi Trẻ Xuân Hòa</h1>
          <p class="text-xs md:text-base">Đoàn TNCS Hồ Chí Minh Phường Xuân Hòa</p>
        </div>
      </div>
      <a href="index.html" class="text-white hover:text-yellow-300 font-medium">← Trang chủ</a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 pt-28 pb-20 px-6 max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-10 text-[#0D47A1]">Tạo Hoạt Động Mới</h1>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form id="form">
        <input id="ten" type="text" placeholder="Tên hoạt động" class="w-full p-4 rounded-xl mb-6 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#2196F3]" required>
        <input id="thoiGian" type="datetime-local" class="w-full p-4 rounded-xl mb-6 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#2196F3]" required>
        <textarea id="moTa" placeholder="Mô tả hoạt động" class="w-full p-4 rounded-xl h-32 mb-6 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#2196F3]"></textarea>

        <label class="block mb-3 text-lg font-medium text-gray-700">Đính kèm hình ảnh</label>
        <input id="anh" type="file" accept="image/*" class="w-full mb-6">
        <img id="preview" class="hidden w-full rounded-2xl mb-6 shadow">

        <button type="submit" class="w-full bg-[#0D47A1] hover:bg-[#1976D2] text-white font-bold text-xl py-5 rounded-full shadow-lg transition">
          TẠO HOẠT ĐỘNG
        </button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-[#0D47A1] text-white py-4 text-center overflow-hidden mt-auto">
    <div class="marquee inline-block whitespace-nowrap">
      <span class="text-lg font-medium">Được thực hiện bởi HMT - Đoàn phường Xuân Hòa</span>
    </div>
  </footer>

  <style>
    .marquee { animation: scroll 25s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  </style>

  <script>
    document.getElementById('anh').onchange = e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => {
          document.getElementById('preview').src = ev.target.result;
          document.getElementById('preview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    };

    document.getElementById('form').onsubmit = e => {
      e.preventDefault();
      const activities = JSON.parse(localStorage.getItem('activities') || '[]');
      activities.push({
        ten: document.getElementById('ten').value,
        thoiGian: document.getElementById('thoiGian').value,
        moTa: document.getElementById('moTa').value,
        anh: document.getElementById('preview').src || ''
      });
      localStorage.setItem('activities', JSON.stringify(activities));
      alert('Hoạt động đã được tạo và hiển thị trên trang chủ!');
      window.location = 'index.html';
    };
  </script>
</body>
</html>
