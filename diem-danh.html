<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Điểm danh cơ sở - Phường Xuân Hòa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root { --primary-blue: #0D47A1; --light-blue: #2196F3; }
    body { background: linear-gradient(to bottom, #e3f2fd, #bbdefb); color: #0d47a1; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gradient-to-r from-[#0D47A1] to-[#1976D2] text-white py-4 shadow-lg fixed w-full z-50">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Emblem_of_the_Communist_Party_of_Vietnam.svg/1200px-Emblem_of_the_Communist_Party_of_Vietnam.svg.png" alt="Logo Đoàn" class="h-10 w-10 md:h-12 md:w-12">
        <div>
          <h1 class="text-lg md:text-2xl font-bold">Tuổi Trẻ Xuân Hòa</h1>
          <p class="text-xs md:text-base">Đoàn TNCS Hồ Chí Minh Phường Xuân Hòa</p>
        </div>
      </div>
      <a href="index.html" class="text-white hover:text-yellow-300 font-medium">← Trang chủ</a>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 pt-28 pb-20 px-6 max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-10 text-[#0D47A1]">Tạo Sự Kiện Điểm Danh</h1>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="mb-8">
        <label class="block text-lg font-medium mb-3 text-gray-700">Tên sự kiện điểm danh</label>
        <input id="tenSuKien" type="text" placeholder="Ví dụ: Sinh hoạt chi đoàn tháng 3" class="w-full px-5 py-4 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-[#2196F3]" required>
      </div>

      <button onclick="taoSuKien()" class="w-full bg-[#0D47A1] hover:bg-[#1976D2] text-white font-bold text-xl py-5 rounded-full shadow-lg transition">
        Tạo & Sinh QR / Link
      </button>

      <div id="result" class="mt-12 hidden text-center">
        <p class="text-xl font-medium mb-4 text-gray-700">Link điểm danh (chia sẻ cho đoàn viên):</p>
        <a id="link" target="_blank" class="text-[#0D47A1] hover:underline break-all block mb-6 text-lg font-medium"></a>

        <div class="bg-white p-6 rounded-2xl shadow-lg inline-block">
          <div id="qrcode" class="mx-auto"></div>
        </div>

        <div class="mt-10">
          <h2 class="text-2xl font-bold text-[#0D47A1] mb-4">Danh sách điểm danh realtime</h2>
          <p class="text-xl mb-6">Hiện tại có <span id="count" class="font-bold text-[#2196F3]">0</span> người tham gia.</p>
          <ul id="danhsach" class="space-y-4 max-h-96 overflow-y-auto bg-gray-50 p-6 rounded-xl"></ul>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-[#0D47A1] text-white py-4 text-center overflow-hidden mt-auto">
    <div class="marquee inline-block whitespace-nowrap">
      <span class="text-lg font-medium">Được thực hiện bởi HMT - Đoàn phường Xuân Hòa</span>
    </div>
  </footer>

  <style>
    .marquee { animation: scroll 25s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  </style>

  <script>
    // THAY CONFIG THẬT CỦA BẠN VÀO ĐÂY
    const firebaseConfig = {
       apiKey: "AIzaSyAiAgc4XXNvZR-Dzm4Qwmicz-8WkS-xb_c",
  authDomain: "doanphuongxuanhoa-133a1.firebaseapp.com",
  projectId: "doanphuongxuanhoa-133a1",
  storageBucket: "doanphuongxuanhoa-133a1.firebasestorage.app",
  messagingSenderId: "427741291509",
  appId: "1:427741291509:web:3fc3fc7a3a8e6d6b11f6bc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function taoSuKien() {
      const ten = document.getElementById('tenSuKien').value.trim();
      if (!ten) return alert('Vui lòng nhập tên sự kiện!');

      const eventId = Date.now().toString();
      const link = `${window.location.origin}/diem-danh-form.html?id=${eventId}`;

      document.getElementById('link').href = link;
      document.getElementById('link').textContent = link;

      document.getElementById('result').classList.remove('hidden');

      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), {
        text: link,
        width: 220,
        height: 220,
        colorDark: "#0D47A1",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      langNgheRealtime(eventId);
    }

    function langNgheRealtime(eventId) {
      db.ref('attendance/' + eventId).on('value', snapshot => {
        const data = snapshot.val();
        let count = 0;
        let html = '';

        if (data) {
          const items = Object.values(data);
          count = items.length;
          items.forEach(item => {
            html += `
              <li class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <strong class="text-[#0D47A1]">${item.ten}</strong><br>
                <span class="text-gray-600">${item.donvi} (${item.chucvu || '-'})</span><br>
                <span class="text-gray-500 text-sm">SĐT: ${item.sdt} • ${item.thoiGian}</span>
              </li>`;
          });
        } else {
          html = '<li class="text-center text-gray-500 py-4">Chưa có đoàn viên nào điểm danh.</li>';
        }

        document.getElementById('count').textContent = count;
        document.getElementById('danhsach').innerHTML = html;
      });
    }
  </script>
</body>
</html>
